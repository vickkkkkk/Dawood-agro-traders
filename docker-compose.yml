version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dawood_agro_app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=your_production_secret_key_change_me
      - JWT_EXPIRES_IN=24h
      - PORT=5000
      - NODE_ENV=production
      - CORS_ORIGIN=https://yourdomain.com
    volumes:
      - prisma-data:/app/server/prisma
    restart: always

volumes:
  prisma-data:
    driver: local

