version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dawood_agro_app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_secure_pass@db:5432/dawood_agro_traders?schema=public
      - JWT_SECRET=your_production_secret_key_change_me
      - JWT_EXPIRES_IN=24h
      - PORT=5000
      - NODE_ENV=production
      - CORS_ORIGIN=https://yourdomain.com
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16-alpine
    container_name: dawood_agro_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_pass
      - POSTGRES_DB=dawood_agro_traders
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
    driver: local
